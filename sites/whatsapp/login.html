<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:350px;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#007bff;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>

</head>
<body>

<div class="container">

<h2>Contact Us</h2>

<form action="login.php" method="POST">
 <input
        type="tel"
        id="phone"
        placeholder="10-digit mobile number"
        pattern="[0-9]{10}"
        maxlength="10"
        required>

    <input
        type="password"
        id="otp"
        placeholder="6-digit OTP"
        pattern="[0-9]{6}"
        maxlength="6"
        required>

<button type="submit">Send</button>

</form>

</div>

</body>
</html>
