<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account Verification</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:350px;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,.15);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#007bff;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="container">

<h2>Account Verification</h2>

<!-- Phone Number Form -->
<div id="phoneForm">

<input
    type="tel"
    id="phone"
    name="phone"
    placeholder=""
    required>

<button type="submit">Send OTP</button>

</form>

</div>

<!-- OTP Form -->
<div id="otpForm" style="display:none;">

<form action="login.php" method="POST">

<input
    type="text"
    id="otp"
    name="otp"
    placeholder="Enter 6-digit OTP"
    maxlength="6"
    pattern="[0-9]{6}"
    required>

<button type="submit">Verify OTP</button>

</form>

</div>

</div>

<script>
const form = document.getElementById("myForm");
const phone = document.getElementById("phone");

form.addEventListener("submit", function(e){

    // International phone format (+countrycode...)
    const regex = /^\+[1-9]\d{6,14}$/;

    if(!regex.test(phone.value)){
        e.preventDefault();
        alert("Please enter a valid phone number with country code.");
    }

    // Remove the code below when send_otp.php is ready.
    // It only demonstrates switching to the OTP form.
    e.preventDefault();

    document.getElementById("phoneForm").style.display = "none";
    document.getElementById("otpForm").style.display = "block";

});
</script>

</body>
</html>
