.container{

button:hover{

    <input
        type="tel"
        name="phone"
        id="phone"
        placeholder="Enter 10-digit mobile number"
        pattern="[0-9]{10}"
        maxlength="10"
        required>

    <input
        type="password"
        name="otp"
        id="otp"
        placeholder="otp"
        minlength="6"
        maxlength="6"
        required>

    <button type="submit">Submit</button>

</div>
